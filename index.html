<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charmie — Tiramisu Artisanal</title>
  <meta name="description" content="Tiramisu thủ công tại TP.HCM. Dành để tặng, dành để nhớ.">
  <link rel="icon" type="image/png" href="uploads/charmie-favicon.png">
  <link rel="apple-touch-icon" href="uploads/charmie-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ───────────────────────────────────────────── */
    :root {
      --ivory:      #F6F1E7;
      --dusty-rose: #C9A49A;
      --mocha:      #7B5E52;
      --champagne:  #E8D9C4;
      --espresso:   #3A2A22;
      --white:      #FFFFFF;
      --trans: 300ms ease;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 16px; line-height: 1.7;
      color: var(--espresso); background: var(--ivory);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    h1, h2, h3 { text-wrap: balance; }
    p { text-wrap: pretty; }
    button { cursor: pointer; font-family: inherit; }
    a { text-decoration: none; color: inherit; }

    .c-apology-banner {
      position: relative;
      z-index: 220;
      padding: 18px 24px 16px;
      border-bottom: 1px solid rgba(201,164,154,0.36);
      background: linear-gradient(90deg, rgba(246,241,231,0.98), rgba(232,217,196,0.48), rgba(246,241,231,0.98));
      text-align: center;
    }
    .c-apology-banner span {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 3.4vw, 44px);
      font-style: italic;
      color: var(--espresso);
      line-height: 1.18;
    }
    .c-apology-banner small {
      display: block;
      margin-top: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dusty-rose);
    }

    /* ── Fade-in ─────────────────────────────────────────────── */
    .fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-in.vis { opacity: 1; transform: none; }

    /* ── Layout ──────────────────────────────────────────────── */
    .c-wrap { max-width: 1180px; margin: 0 auto; padding: 0 48px; }

    /* ── Eyebrow ─────────────────────────────────────────────── */
    .c-eyebrow {
      display: block; font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--dusty-rose); margin-bottom: 20px;
    }
    .c-eyebrow--lt { color: var(--dusty-rose); }

    /* ── Nav ─────────────────────────────────────────────────── */
    .c-nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(246,241,231,0.93);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid transparent;
      transition: border-color var(--trans), background var(--trans);
    }
    .c-nav--up { border-bottom-color: var(--champagne); }
    .c-nav-logo {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 21px; color: var(--espresso); letter-spacing: -0.4px;
    }
    .c-nav-links { display: flex; align-items: center; gap: 28px; }
    .c-nav-sep { width: 1px; height: 14px; background: var(--champagne); display: block; }
    .c-nav-link {
      background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px; letter-spacing: 0.3px;
      color: var(--mocha); transition: color var(--trans); padding: 0;
    }
    .c-nav-link:hover { color: var(--espresso); }
    .c-nav-link--pill {
      padding: 7px 20px; border: 1px solid var(--mocha);
      border-radius: 24px; color: var(--mocha);
    }
    .c-nav-link--pill:hover { background: var(--mocha); color: var(--ivory); }

    /* ── Hero (default = split) ──────────────────────────────── */
    .c-hero {
      position: relative; min-height: clamp(680px, calc(100vh - 72px), 820px); overflow: hidden;
      background: var(--ivory);
      display: grid; grid-template-columns: 1fr 1fr;
    }
    .c-hero-grain {
      position: absolute; inset: -50%; width: 200%; height: 200%;
      opacity: 0.04; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }
    /* Soft background orb — visible in centered mode, faint in split */
    .c-hero-orb {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 0;
      top: -140px; right: -140px; width: 640px; height: 640px;
      background: radial-gradient(circle, var(--champagne) 0%, transparent 68%);
      opacity: 0.55;
    }
    .c-hero--split .c-hero-orb { opacity: 0.18; }

    /* Left panel */
    .c-hero-left {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; justify-content: flex-start;
      padding: clamp(96px, 13vh, 138px) max(48px,5vw) 88px max(48px,8vw);
    }
    .c-hero-wordmark {
      font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400;
      font-size: clamp(72px, 10vw, 136px);
      line-height: 0.93; letter-spacing: -3px;
      color: var(--espresso); margin-bottom: 22px;
    }
    .c-hero-tagline {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(17px, 1.8vw, 22px); font-weight: 400;
      color: var(--mocha); margin-bottom: 18px; letter-spacing: 0.2px;
    }
    .c-hero-copy {
      font-weight: 300; font-size: 15px; color: var(--mocha);
      line-height: 1.85; max-width: 380px; margin-bottom: 38px;
    }
    .c-hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }

    /* Right panel */
    .c-hero-right {
      position: relative; z-index: 1;
      display: flex; align-items: flex-start; justify-content: center;
      padding: clamp(112px, 16vh, 164px) 8vw 64px 24px;
    }
    .c-hero-img-wrap {
      position: relative;
      width: min(420px, 85%); aspect-ratio: 1;
    }
    .c-hero-img {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--champagne);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 13px; color: var(--mocha); letter-spacing: 1px;
      overflow: hidden;
    }
    .c-hero-img-ring {
      position: absolute; inset: -18px; border-radius: 50%;
      border: 1px dashed rgba(201,164,154,0.4);
      animation: gentleSpin 30s linear infinite;
    }
    @keyframes gentleSpin { to { transform: rotate(360deg); } }
    .c-hero-dot {
      position: absolute; border-radius: 50%; background: var(--dusty-rose);
    }
    .c-hero-dot--a { width: 11px; height: 11px; opacity: 0.35; top: 16%; right: 6%; }
    .c-hero-dot--b { width: 6px; height: 6px; opacity: 0.2; bottom: 22%; left: 4%; }

    /* Centered override */
    .c-hero--centered {
      display: flex; align-items: center; justify-content: center;
    }
    .c-hero--centered .c-hero-left {
      align-items: center; text-align: center;
      padding: 110px 48px; max-width: 680px;
    }
    .c-hero--centered .c-hero-copy { margin: 0 auto 38px; }
    .c-hero--centered .c-hero-btns { justify-content: center; }
    .c-hero--centered .c-hero-right { display: none; }

    /* Scroll indicator */
    .c-hero-scroll {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      z-index: 2; animation: scrollBob 2.8s ease-in-out infinite;
    }
    .c-hero-scroll-lbl {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--dusty-rose); font-family: 'DM Sans', sans-serif; opacity: 0.6;
    }
    .c-hero-scroll-line {
      display: block; width: 1px; height: 48px;
      background: linear-gradient(to bottom, var(--dusty-rose), transparent);
    }
    @keyframes scrollBob {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; }
      55%       { transform: translateX(-50%) translateY(10px); opacity: 0.4; }
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .c-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 28px; border-radius: 24px;
      font-family: 'DM Sans', sans-serif; font-size: 13.5px;
      font-weight: 400; letter-spacing: 0.25px;
      border: 1px solid transparent; cursor: pointer;
      transition: background var(--trans), color var(--trans), border-color var(--trans);
    }
    .c-btn-fill  { background: var(--mocha); color: var(--ivory); border-color: var(--mocha); }
    .c-btn-fill:hover  { background: var(--espresso); border-color: var(--espresso); }
    .c-btn-ring  { background: transparent; color: var(--mocha); border-color: var(--mocha); }
    .c-btn-ring:hover  { background: var(--mocha); color: var(--ivory); }
    .c-btn-ghost { background: transparent; color: var(--mocha); border-color: var(--champagne); padding: 8px 17px; font-size: 13px; }
    .c-btn-ghost:hover { background: var(--mocha); color: var(--ivory); border-color: var(--mocha); }
    .c-btn-ivory { background: var(--ivory); color: var(--espresso); border-color: var(--ivory); }
    .c-btn-ivory:hover { background: var(--champagne); border-color: var(--champagne); }
    .c-btn-rim   { background: transparent; color: var(--ivory); border-color: rgba(246,241,231,0.36); }
    .c-btn-rim:hover   { border-color: var(--ivory); background: rgba(246,241,231,0.1); }

    /* ── Statement (dark interstitial) ──────────────────────── */
    .c-stmt {
      background: var(--espresso); padding: 108px 0;
      position: relative; overflow: hidden;
    }
    .c-stmt::before {
      content: ''; position: absolute; inset: 0;
      background: url('uploads/pasted-1779544573098-0.png') center/cover no-repeat;
      opacity: 0.12; mix-blend-mode: overlay; pointer-events: none;
    }
    .c-stmt-inner { text-align: center; position: relative; z-index: 1; }
    .c-stmt-ornament {
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      letter-spacing: 4px; color: var(--dusty-rose); opacity: 0.7;
      display: block; margin-bottom: 28px;
    }
    .c-stmt-text {
      font-family: 'Playfair Display', serif; font-weight: 400;
      font-size: clamp(30px, 5vw, 62px); line-height: 1.22;
      color: var(--ivory); margin-bottom: 28px;
    }
    .c-stmt-em { color: var(--dusty-rose); font-style: italic; }
    .c-stmt-sig {
      display: block; font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 15px;
      color: var(--champagne); opacity: 0.5;
    }

    /* ── Brand Story ─────────────────────────────────────────── */
    .c-story { padding: 112px 0; background: var(--white); }
    .c-story-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 88px; align-items: start;
    }
    .c-story-qmark {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 100px; line-height: 0.7;
      color: var(--dusty-rose); opacity: 0.22;
      margin-bottom: 10px; user-select: none;
    }
    .c-story-h2 {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(26px, 3vw, 36px); font-weight: 400;
      color: var(--espresso); margin-bottom: 24px; line-height: 1.3;
    }
    .c-story-p { font-weight: 300; font-size: 15px; color: var(--mocha); margin-bottom: 16px; line-height: 1.85; }
    .c-feats { display: flex; flex-direction: column; }
    .c-feat { display: flex; gap: 18px; align-items: flex-start; padding: 22px 0; border-bottom: 1px solid var(--champagne); }
    .c-feat:first-child { border-top: 1px solid var(--champagne); }
    .c-feat-icon { font-size: 19px; width: 34px; flex-shrink: 0; margin-top: 2px; }
    .c-feat-name {
      font-family: 'Cormorant Garamond', serif; font-variant: small-caps;
      font-size: 14.5px; letter-spacing: 1.2px; color: var(--espresso); margin-bottom: 4px;
    }
    .c-feat-note { font-size: 13px; color: var(--dusty-rose); font-weight: 300; }

    /* ── Section headers ─────────────────────────────────────── */
    .c-sechd { text-align: center; margin-bottom: 52px; }
    .c-sechd-row {
      display: flex; align-items: flex-end;
      justify-content: space-between; margin-bottom: 36px;
    }
    .c-sec-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 3.5vw, 42px); font-weight: 400;
      color: var(--espresso); margin-bottom: 10px;
    }
    .c-sec-sub { font-size: 14px; color: var(--dusty-rose); font-weight: 300; font-style: italic; }

    /* ── Products (horizontal scroll) ───────────────────────── */
    .c-prods { padding: 112px 0; background: var(--ivory); }
    .c-prods-arrows { display: flex; gap: 10px; padding-bottom: 4px; }
    .c-arrow {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--white); border: 1px solid var(--champagne);
      color: var(--mocha); display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background var(--trans), color var(--trans), border-color var(--trans);
    }
    .c-arrow:hover { background: var(--mocha); color: var(--ivory); border-color: var(--mocha); }
    .c-prods-track {
      display: flex; gap: 20px;
      overflow-x: auto; scroll-snap-type: x mandatory;
      scrollbar-width: none; padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .c-prods-track::-webkit-scrollbar { display: none; }
    .c-prods-pad { min-width: 28px; flex-shrink: 0; }
    .c-prods-bar {
      height: 1px; background: var(--champagne); margin-top: 28px;
      position: relative; overflow: hidden;
    }
    .c-prods-bar-fill {
      position: absolute; top: 0; left: 0; height: 100%;
      background: var(--mocha); transition: width 80ms linear;
      min-width: 4%;
    }

    /* ── Product Card ────────────────────────────────────────── */
    .c-card {
      position: relative; border-radius: 12px;
      border: 1px solid var(--champagne); overflow: hidden;
      background: var(--white);
      min-width: 292px; flex-shrink: 0; scroll-snap-align: start;
      transition: box-shadow var(--trans), transform var(--trans);
    }
    .c-card:hover { box-shadow: 0 20px 56px rgba(58,42,34,0.10); transform: translateY(-5px); }
    .c-card--warm { background: var(--ivory); }
    .c-card--star { background: rgba(201,164,154,0.07); border-color: var(--dusty-rose); }
    .c-card--warm.c-card--star { background: rgba(201,164,154,0.14); }
    .c-card-img {
      height: 220px; background: var(--champagne);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 12.5px; color: var(--mocha); letter-spacing: 1px;
    }
    .c-card--star .c-card-img { background: rgba(201,164,154,0.32); }
    .c-card-badge {
      position: absolute; top: 14px; right: 14px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 10.5px; letter-spacing: 0.4px;
      font-family: 'DM Sans', sans-serif;
    }
    .c-card-badge--bs  { background: var(--dusty-rose); color: var(--white); }
    .c-card-badge--ltd { background: var(--espresso);   color: var(--ivory); }
    .c-card-bd { padding: 20px 22px 22px; }
    .c-card-sub {
      font-size: 10px; color: var(--dusty-rose); letter-spacing: 2.5px;
      text-transform: uppercase; font-family: 'DM Sans', sans-serif; margin-bottom: 8px;
    }
    .c-card-name {
      font-family: 'Cormorant Garamond', serif; font-variant: small-caps;
      font-size: 19px; letter-spacing: 2px; color: var(--espresso); margin-bottom: 8px;
    }
    .c-card-desc { font-size: 13px; color: var(--mocha); font-weight: 300; line-height: 1.7; margin-bottom: 18px; }
    .c-card-ft { display: flex; align-items: flex-end; justify-content: space-between; }
    .c-card-price { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--mocha); }
    .c-card-wt { font-size: 11.5px; color: var(--dusty-rose); margin-top: 3px; }

    /* ── Occasions ───────────────────────────────────────────── */
    .c-occ { padding: 88px 0; background: var(--champagne); }
    .c-sechd { text-align: center; margin-bottom: 48px; }
    .c-occ-chips { display: flex; flex-wrap: wrap; gap: 13px; justify-content: center; }
    .c-chip {
      display: flex; align-items: center; gap: 9px;
      padding: 12px 22px; border-radius: 40px;
      background: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.8);
      font-size: 14.5px; color: var(--espresso); cursor: pointer; user-select: none;
      transition: background var(--trans), color var(--trans), transform 200ms ease;
    }
    .c-chip:hover { background: var(--espresso); color: var(--ivory); transform: translateY(-2px); }

    /* ── Order CTA ───────────────────────────────────────────── */
    .c-cta {
      padding: 128px 0; background: var(--espresso);
      position: relative; overflow: hidden;
    }
    .c-cta::before {
      content: ''; position: absolute; inset: 0;
      background: url('uploads/pasted-1779544573098-0.png') center/cover no-repeat;
      opacity: 0.1; mix-blend-mode: overlay; pointer-events: none;
    }
    .c-cta-inner { text-align: center; position: relative; z-index: 1; }
    .c-cta-title {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(40px, 6vw, 72px); font-weight: 400;
      color: var(--ivory); line-height: 1.1; margin-bottom: 24px;
    }
    .c-cta-copy { font-size: 15px; font-weight: 300; color: var(--champagne); line-height: 1.85; margin-bottom: 48px; }
    .c-cta-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
    .c-cta-note { font-size: 12.5px; color: var(--dusty-rose); font-weight: 300; opacity: 0.8; }

    /* ── Footer ──────────────────────────────────────────────── */
    .c-foot { background: var(--espresso); border-top: 1px solid rgba(232,217,196,0.1); padding: 22px 0; }
    .c-foot-inner { display: flex; align-items: center; justify-content: space-between; }
    .c-foot span { font-size: 12px; color: var(--champagne); font-weight: 300; opacity: 0.55; }
    .c-foot-links { display: flex; gap: 22px; align-items: center; }
    .c-foot-links a { color: var(--champagne); opacity: 0.5; transition: opacity var(--trans), color var(--trans); }
    .c-foot-links a:hover { opacity: 1; color: var(--dusty-rose); }

    /* ── Palette variants ────────────────────────────────────── */
    .palette-blush {
      --ivory: #FBF4F2; --dusty-rose: #C0888E;
      --mocha: #8B5C6A; --champagne: #F0D8D2; --espresso: #30181E;
    }
    .palette-forest {
      --ivory: #F1F3EE; --dusty-rose: #7A9C7E;
      --mocha: #4E6E55; --champagne: #D0DAC8; --espresso: #1E2E22;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 900px) {
      .c-hero, .c-hero--split {
        min-height: auto;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-start;
      }
      .c-hero-left, .c-hero--split .c-hero-left {
        text-align: center; align-items: center;
        padding: 56px 32px 64px; order: 1;
      }
      .c-hero-btns, .c-hero--split .c-hero-btns { justify-content: center; }
      .c-hero-copy { margin: 0 auto 36px; }
      .c-hero-right { order: 0; padding: 48px 32px 0; }
      .c-hero-img-wrap { width: min(260px, 70vw); }
      .c-hero-scroll { display: none; }
    }
    @media (max-width: 768px) {
      .c-apology-banner { padding: 14px 18px 13px; }
      .c-apology-banner small { font-size: 10px; letter-spacing: 1.6px; }
      .c-wrap { padding: 0 22px; }
      .c-nav  { padding: 14px 16px; gap: 12px; }
      .c-nav-logo { flex-shrink: 0; font-size: 20px; }
      .c-nav-links { min-width: 0; flex: 1; justify-content: flex-end; gap: 12px; }
      .c-nav-sep { display: none; }
      .c-nav-link { font-size: 12px; white-space: nowrap; }
      .c-nav-link--pill { padding: 6px 14px; }
      .c-story { padding: 72px 0; }
      .c-story-grid { grid-template-columns: 1fr; gap: 48px; }
      .c-stmt { padding: 72px 0; }
      .c-prods { padding: 72px 0; }
      .c-sechd-row { flex-direction: column; align-items: flex-start; gap: 18px; }
      .c-prods .c-sechd-row { align-items: center; text-align: center; margin-bottom: 28px; }
      .c-prods-arrows,
      .c-prods-bar { display: none; }
      .c-prods-track {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
        width: 100%;
        padding: 0 22px;
        overflow: visible;
        scroll-snap-type: none;
      }
      .c-prods-pad { display: none; }
      .c-card {
        width: 100%;
        min-width: 0;
        scroll-snap-align: none;
      }
      .c-card:hover {
        transform: none;
      }
      .c-card-img {
        height: clamp(210px, 62vw, 280px);
      }
      .c-card-bd {
        padding: 20px 20px 22px;
      }
      .c-card-ft {
        gap: 16px;
      }
      .c-card-desc {
        min-height: 0;
      }
      .c-occ { padding: 64px 0; }
      .c-cta { padding: 80px 0; }
      .c-cta-btns { flex-direction: column; align-items: center; }
      .c-foot-inner { flex-direction: column; gap: 14px; text-align: center; }
      .c-hero-right {
        display: flex;
        padding: 24px 24px 0;
      }
      .c-hero-img-wrap {
        width: min(208px, 58vw);
      }
      .c-hero-left,
      .c-hero--split .c-hero-left {
        padding-top: 24px;
      }
    }

    @media (max-width: 420px) {
      .c-nav { padding-inline: 12px; }
      .c-nav-logo { font-size: 19px; }
      .c-nav-links { gap: 9px; }
      .c-nav-link { font-size: 11.5px; }
      .c-nav-link--pill { padding: 6px 11px; }
      .c-hero-btns {
        width: 100%;
        justify-content: center;
      }
      .c-hero-btns .c-btn {
        min-width: 0;
        padding-inline: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="charmie-components.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [t, setTweak] = useTweaks(
        /*EDITMODE-BEGIN*/{"palette":"warm","heroLayout":"split","cardStyle":"clean"}/*EDITMODE-END*/
      );

      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const fn = () => setScrolled(window.pageYOffset > 50);
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      useEffect(() => {
        const el = document.documentElement;
        el.classList.remove('palette-warm', 'palette-blush', 'palette-forest');
        if (t.palette !== 'warm') el.classList.add(`palette-${t.palette}`);
      }, [t.palette]);

      return (
        <>
          <div className="c-apology-banner" role="note" aria-label="Lời xin lỗi">
            <span>Xin lỗi bé Chang nhiều</span>
          </div>
          <Nav scrolled={scrolled} />
          <Hero layout={t.heroLayout} />
          <Statement />
          <BrandStory />
          <Products cs={t.cardStyle} />
          <Occasions />
          <OrderCTA />
          <Footer />
          <TweaksPanel>
            <TweakSection label="Màu sắc" />
            <TweakRadio label="Palette" value={t.palette}
              options={['warm','blush','forest']}
              onChange={v => setTweak('palette', v)} />
            <TweakSection label="Layout" />
            <TweakRadio label="Hero" value={t.heroLayout}
              options={['split','centered']}
              onChange={v => setTweak('heroLayout', v)} />
            <TweakRadio label="Cards" value={t.cardStyle}
              options={['clean','warm']}
              onChange={v => setTweak('cardStyle', v)} />
          </TweaksPanel>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
